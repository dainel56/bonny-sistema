<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bonny Finance — Sistema de Producción v5.0</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── ROOT ────────────────────────────────────────────────────────── */
:root{
  --teal:    #00d4aa;
  --teal2:   #00a886;
  --navy:    #0d1b2a;
  --navy2:   #1a2f45;
  --navy3:   #243850;
  --gold:    #f4a300;
  --green:   #2ecc71;
  --red:     #e74c3c;
  --blue:    #3498db;
  --text:    #e8f4f0;
  --muted:   #7a9e95;
  --border:  rgba(0,212,170,.15);
  --card:    rgba(13,27,42,.8);
  --radius:  10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--navy);
  color:var(--text);
  font-family:'Space Grotesk',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 60% 40% at 80% 10%, rgba(0,212,170,.06) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 10% 80%, rgba(244,163,0,.04) 0%, transparent 50%);
  pointer-events:none;z-index:0;
}

/* ── LAYOUT ──────────────────────────────────────────────────────── */
.shell{position:relative;z-index:1;display:flex;min-height:100vh}
.sidebar{
  width:220px;flex-shrink:0;
  background:rgba(10,20,32,.95);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  padding:0 0 20px;
  position:sticky;top:0;height:100vh;
  overflow-y:auto;
}
.main{flex:1;padding:28px 32px 60px;max-width:960px}

/* ── SIDEBAR ─────────────────────────────────────────────────────── */
.sb-logo{
  padding:22px 18px 16px;
  border-bottom:1px solid var(--border);
  margin-bottom:10px;
}
.sb-logo-name{font-size:16px;font-weight:700;color:var(--teal);letter-spacing:-.3px}
.sb-logo-ver{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px}

.sb-section{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:10px 18px 6px;font-family:'DM Mono',monospace}

.sb-btn{
  display:flex;align-items:center;gap:10px;
  padding:9px 18px;
  font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:500;
  color:#8ab0a8;
  background:transparent;border:none;cursor:pointer;
  width:100%;text-align:left;
  transition:all .14s;
  border-left:2px solid transparent;
}
.sb-btn:hover{color:var(--text);background:rgba(0,212,170,.06);border-left-color:rgba(0,212,170,.3)}
.sb-btn.active{color:var(--teal);background:rgba(0,212,170,.1);border-left-color:var(--teal);font-weight:600}
.sb-icon{width:16px;text-align:center;flex-shrink:0;font-size:14px}

.sb-divider{height:1px;background:var(--border);margin:10px 18px}

/* ── PANELS ──────────────────────────────────────────────────────── */
.panel{display:none}
.panel.active{display:block}

/* ── HEADER ──────────────────────────────────────────────────────── */
.page-head{margin-bottom:24px}
.page-title{font-size:26px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px}
.page-sub{font-size:13px;color:var(--muted)}
.teal{color:var(--teal)}
.gold{color:var(--gold)}

/* ── CARDS ───────────────────────────────────────────────────────── */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px 22px;
  margin-bottom:16px;
  backdrop-filter:blur(8px);
}
.card-title{
  font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--teal);margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
.card-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── FORM ELEMENTS ───────────────────────────────────────────────── */
label{font-size:11px;color:var(--muted);display:block;margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase}
input[type=text],input[type=password],textarea,select{
  width:100%;
  background:rgba(0,0,0,.3);
  border:1px solid var(--border);
  border-radius:6px;
  color:var(--text);
  font-family:'Space Grotesk',sans-serif;
  font-size:13px;
  padding:9px 12px;
  outline:none;
  resize:vertical;
  transition:border-color .15s;
}
input:focus,textarea:focus,select:focus{border-color:var(--teal)}
input::placeholder,textarea::placeholder{color:rgba(122,158,149,.5)}
select option{background:var(--navy2);color:var(--text)}

.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.form-row.three{grid-template-columns:1fr 1fr 1fr}
.form-group{margin-bottom:14px}

/* ── BUTTONS ─────────────────────────────────────────────────────── */
.btn{
  font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;
  padding:9px 18px;border-radius:7px;border:none;cursor:pointer;
  display:inline-flex;align-items:center;gap:7px;
  transition:all .15s;white-space:nowrap;
}
.btn-primary{background:var(--teal);color:var(--navy);font-weight:700}
.btn-primary:hover{background:var(--teal2);transform:translateY(-1px)}
.btn-gold{background:var(--gold);color:var(--navy);font-weight:700}
.btn-gold:hover{opacity:.88;transform:translateY(-1px)}
.btn-outline{background:transparent;color:var(--teal);border:1px solid var(--border)}
.btn-outline:hover{border-color:var(--teal);background:rgba(0,212,170,.08)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid transparent}
.btn-ghost:hover{color:var(--text);background:rgba(255,255,255,.05)}
.btn-copy{background:rgba(0,212,170,.12);color:var(--teal);border:1px solid var(--border)}
.btn-copy:hover{background:rgba(0,212,170,.2)}
.btn-sm{font-size:11px;padding:6px 12px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}

/* ── OUTPUT BOX ──────────────────────────────────────────────────── */
.output-box{
  background:rgba(0,0,0,.35);
  border:1px solid var(--border);
  border-radius:8px;
  padding:16px;
  font-family:'DM Mono',monospace;
  font-size:12px;
  color:#a8d5cb;
  line-height:1.7;
  white-space:pre-wrap;
  word-break:break-word;
  max-height:420px;
  overflow-y:auto;
  position:relative;
}
.output-box:empty::before{content:'El prompt generado aparecerá aquí...';color:var(--muted);font-style:italic}
.output-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:8px;
}
.output-label{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-family:'DM Mono',monospace}

/* ── ALERT / INFO / BADGE / TOAST (Mantenidos igual) ─────────────── */
.info-box{background:rgba(0,212,170,.06);border:1px solid rgba(0,212,170,.2);border-left:3px solid var(--teal);border-radius:6px;padding:12px 14px;font-size:12px;color:#8abfb8;line-height:1.6;margin-bottom:14px;}
.warn-box{background:rgba(244,163,0,.06);border:1px solid rgba(244,163,0,.2);border-left:3px solid var(--gold);border-radius:6px;padding:12px 14px;font-size:12px;color:#c4a059;line-height:1.6;margin-bottom:14px;}
.badge-teal{background:rgba(0,212,170,.15);color:var(--teal);border:1px solid rgba(0,212,170,.3); padding: 2px 5px; border-radius: 4px; font-size: 10px;}
.badge-red{background:rgba(231,76,60,.15);color:var(--red);border:1px solid rgba(231,76,60,.3); padding: 2px 5px; border-radius: 4px; font-size: 10px;}
.badge-green{background:rgba(46,204,113,.15);color:var(--green);border:1px solid rgba(46,204,113,.3); padding: 2px 5px; border-radius: 4px; font-size: 10px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

</style>
</head>
<body>

<div class="shell">
<aside class="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-name">🐰 Bonny Finance</div>
    <div class="sb-logo-ver">Sistema v5.0 · 2026</div>
  </div>
  <div style="padding:10px 14px;border-bottom:1px solid var(--border)">
    <div style="font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;font-family:'DM Mono',monospace">🔑 Gemini API Key</div>
    <input type="password" id="gemApiKey" placeholder="AIzaSy..."
      oninput="saveApiKey()">
    <div style="font-size:9px;margin-top:4px;font-family:'DM Mono',monospace" id="apiKeyStatus" class="badge-red">Sin configurar</div>
  </div>

  <div class="sb-section">🤖 IA Automatizada</div>
  <button class="sb-btn" onclick="nav('orquestador')" style="background:linear-gradient(135deg,rgba(0,212,170,.15),rgba(244,163,0,.1));border-left-color:var(--gold)"><span class="sb-icon">🚀</span>Orquestador IA</button>

  <div class="sb-divider"></div>
  <div class="sb-section">Producción Manual</div>
  <button class="sb-btn active" onclick="nav('produccion')"><span class="sb-icon">⚡</span>Nuevo video</button>
  <button class="sb-btn" onclick="nav('titulos')"><span class="sb-icon">📋</span>Títulos CTR</button>
  <button class="sb-btn" onclick="nav('miniaturas')"><span class="sb-icon">🖼</span>Miniaturas</button>
  <button class="sb-btn" onclick="nav('escenas')"><span class="sb-icon">🎬</span>54 Escenas</button>
</aside>

<main class="main">

<div class="panel active" id="p-produccion">
  <div class="page-head">
    <div class="page-title">⚡ Nuevo <span class="teal">Video</span></div>
    <div class="page-sub">Completa el tema y el sistema genera el prompt ACTUALIZAR listo para pegar en Claude</div>
  </div>

  <div class="card">
    <div class="card-title">01 — Tema del video</div>
    <div class="form-group">
      <label>Tema principal</label>
      <input type="text" id="tema" placeholder="ej: Por qué tu tarjeta de débito te hace perder dinero">
    </div>
    <div class="form-row">
      <div>
        <label>Tipo de video</label>
        <select id="tipo">
          <option value="A">Tipo A — Educativo con afiliado integrado (70%)</option>
          <option value="B">Tipo B — Review directa de producto (20%)</option>
          <option value="C">Tipo C — Educativo puro sin afiliado (10%)</option>
        </select>
      </div>
      <div>
        <label>Afiliado (si aplica)</label>
        <select id="afiliado">
          <option value="">Ninguno</option>
          <option value="Nu">Nu</option>
          <option value="Mercado Pago">Mercado Pago</option>
        </select>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="ejecutarAccion('produccion')">⚡ Generar prompt ACTUALIZAR</button>
    </div>
  </div>

  <div class="card" id="out-produccion-card" style="display:none">
    <div class="output-box" id="out-produccion"></div>
    <button class="btn btn-copy btn-sm" onclick="copyOutput('out-produccion')">📋 Copiar</button>
  </div>
</div>

<div class="panel" id="p-orquestador">
  <div class="page-head">
    <div class="page-title">🚀 Orquestador <span class="teal">IA Maestro</span></div>
  </div>
  <div class="card">
    <label>Tema Maestro</label>
    <input type="text" id="tema-orq" placeholder="Ej: La verdad sobre los fondos de inversión">
    <button class="btn btn-primary" style="margin-top:15px" onclick="ejecutarAccion('orquestador')">⚡ Generar JSON Maestro</button>
  </div>
  <div class="card" id="out-orquestador-card" style="display:none">
    <div class="output-box" id="out-orquestador"></div>
  </div>
</div>

<div class="panel" id="p-titulos">
  <div class="page-head"><div class="page-title">📋 Títulos <span class="teal">CTR</span></div></div>
  <div class="card">
    <input type="text" id="tit-tema" placeholder="Tema para títulos">
    <button class="btn btn-primary" style="margin-top:15px" onclick="ejecutarAccion('titulos')">📋 Generar Títulos</button>
  </div>
  <div class="card" id="out-titulos-card" style="display:none">
    <div class="output-box" id="out-titulos"></div>
  </div>
</div>

<div class="panel" id="p-escenas">
  <div class="page-head"><div class="page-title">🎬 54 <span class="teal">Escenas</span></div></div>
  <div class="card">
    <input type="text" id="esc-tema" placeholder="Tema para las 54 escenas">
    <button class="btn btn-primary" style="margin-top:15px" onclick="ejecutarAccion('escenas')">🎬 Generar Prompts</button>
  </div>
  <div class="card" id="out-escenas-card" style="display:none">
    <div class="output-box" id="out-escenas"></div>
  </div>
</div>

</main>
</div>

<script>
// --- NAVEGACION ---
function nav(id) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('p-' + id).classList.add('active');
    document.querySelectorAll('.sb-btn').forEach(b => b.classList.remove('active'));
    if(event) event.currentTarget.classList.add('active');
}

// --- API KEY MANAGEMENT ---
function saveApiKey() {
    const key = document.getElementById('gemApiKey').value;
    localStorage.setItem('bonny_api_key', key);
    updateKeyStatus(key);
}
function updateKeyStatus(key) {
    const status = document.getElementById('apiKeyStatus');
    if(key.length > 10) { status.textContent = "Configurada"; status.className = "badge-green"; }
    else { status.textContent = "Sin configurar"; status.className = "badge-red"; }
}
window.onload = () => {
    const savedKey = localStorage.getItem('bonny_api_key');
    if(savedKey) { document.getElementById('gemApiKey').value = savedKey; updateKeyStatus(savedKey); }
}

// --- FUNCION MAESTRA CORREGIDA ---
async function ejecutarAccion(tipo) {
    const apiKey = document.getElementById('gemApiKey').value;
    if(!apiKey) return alert("Por favor, configura tu API Key primero.");

    let tema = "";
    let promptFinal = "";

    if(tipo === 'produccion') {
        tema = document.getElementById('tema').value;
        const tipoVid = document.getElementById('tipo').value;
        const afi = document.getElementById('afiliado').value;
        promptFinal = `Genera un prompt de actualización para Claude sobre el video: "${tema}". Tipo: ${tipoVid}, Afiliado: ${afi}.`;
    } else if(tipo === 'orquestador') {
        tema = document.getElementById('tema-orq').value;
        promptFinal = `Genera un JSON con 10 escenas para: "${tema}". Formato JSON puro: { "proyecto": "${tema}", "escenas": [] }`;
    } else if(tipo === 'titulos') {
        tema = document.getElementById('tit-tema').value;
        promptFinal = `Genera 3 títulos virales para: "${tema}".`;
    } else if(tipo === 'escenas') {
        tema = document.getElementById('esc-tema').value;
        promptFinal = `Genera 54 prompts de imagen estilo Bonny Finance para: "${tema}".`;
    }

    const outputBox = document.getElementById('out-' + tipo);
    const outputCard = document.getElementById('out-' + tipo + '-card');
    outputBox.textContent = "Generando respuesta...";
    outputCard.style.display = 'block';

    // ENDPOINT ACTUALIZADO v1
    const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

    try {
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: promptFinal }] }],
                generationConfig: {
                    temperature: 0.7,
                    responseMimeType: (tipo === 'orquestador') ? "application/json" : "text/plain"
                }
            })
        });

        const data = await response.json();
        if (data.error) {
            outputBox.textContent = "Error: " + data.error.message;
        } else {
            outputBox.textContent = data.candidates[0].content.parts[0].text;
        }
    } catch (error) {
        outputBox.textContent = "Error de conexión: " + error.message;
    }
}

function copyOutput(id) {
    const text = document.getElementById(id).textContent;
    navigator.clipboard.writeText(text);
    alert("Copiado al portapapeles.");
}
</script>

</body>
</html>
